<header class="sc-topbar">
  <div class="sc-topbar__left">
    <button class="sc-topbar__toggle" (click)="toggleSidebar.emit()" mat-icon-button aria-label="Toggle menú">
      <mat-icon>menu</mat-icon>
    </button>
    <a class="sc-topbar__brand" routerLink="/dashboard">
      <div class="sc-topbar__brand-icon"><mat-icon>cloud</mat-icon></div>
      <span class="sc-topbar__brand-name">Saicloud</span>
    </a>
  </div>

  <div class="sc-topbar__right">
    <app-notification-bell />

    <button class="sc-topbar__action" mat-icon-button
      (click)="themeService.toggleDarkMode()"
      [matTooltip]="themeService.isDark ? 'Modo claro' : 'Modo oscuro'">
      <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <div class="sc-topbar__sep"></div>

    <button class="sc-topbar__user" mat-button aria-label="Perfil">
      <div class="sc-topbar__avatar">
        {{ (currentUser()?.full_name || currentUser()?.email || 'U').charAt(0).toUpperCase() }}
      </div>
      <div class="sc-topbar__user-info">
        <span class="sc-topbar__user-name">{{ currentUser()?.full_name || currentUser()?.email }}</span>
        <span class="sc-topbar__user-role">{{ currentUser()?.role }}</span>
      </div>
      <mat-icon class="sc-topbar__user-chevron">expand_more</mat-icon>
    </button>

    <button class="sc-topbar__action" mat-icon-button matTooltip="Cerrar sesión" (click)="authService.logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</header>
