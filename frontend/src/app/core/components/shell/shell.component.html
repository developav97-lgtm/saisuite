<!-- frontend/src/app/core/components/shell/shell.component.html -->
<div class="sc-shell">
    <app-topbar [sidebarVisible]="sidebarVisible" (toggleSidebar)="toggleSidebar()" />
    <div class="sc-shell__body">
        <app-sidebar [(visible)]="sidebarVisible" />
        <main class="sc-shell__main">
            <router-outlet />
        </main>
    </div>
</div>
<ngx-sonner-toaster position="top-right" [richColors]="true" [duration]="5000" [visibleToasts]="5" />
