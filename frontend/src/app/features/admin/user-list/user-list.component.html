<div class="ul-container">

  <div class="ul-toolbar">
    <h2 class="ul-title">Usuarios</h2>
    <span class="ul-spacer"></span>
    <button mat-raised-button color="primary" routerLink="/admin/usuarios/nuevo">
      <mat-icon>person_add</mat-icon>
      Nuevo usuario
    </button>
  </div>

  @if (loading()) {
    <div class="ul-loading">
      <mat-spinner diameter="40" />
    </div>
  } @else {
    <table mat-table [dataSource]="users()" class="ul-table mat-elevation-z1">

      <!-- Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let u">
          <div class="ul-user-cell">
            <div class="ul-avatar">{{ u.full_name.charAt(0).toUpperCase() }}</div>
            <span>{{ u.full_name }}</span>
          </div>
        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <!-- Rol -->
      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let u">
          <span class="ul-chip ul-chip--{{ u.role }}">
            {{ roleLabels[u.role] ?? u.role }}
          </span>
        </td>
      </ng-container>

      <!-- Estado -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let u">
          @if (u.is_active) {
            <span class="ul-badge ul-badge--active">Activo</span>
          } @else {
            <span class="ul-badge ul-badge--inactive">Inactivo</span>
          }
        </td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="ul-col-acciones">Acciones</th>
        <td mat-cell *matCellDef="let u" class="ul-col-acciones">
          <button mat-icon-button color="primary"
            [routerLink]="['/admin/usuarios', u.id]"
            matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          @if (u.is_active) {
            <button mat-icon-button color="warn"
              (click)="confirmarDesactivar(u)"
              matTooltip="Desactivar">
              <mat-icon>person_off</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell ul-empty" [attr.colspan]="displayedColumns.length">
          No hay usuarios registrados.
        </td>
      </tr>

    </table>
  }

</div>
