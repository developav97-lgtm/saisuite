<div class="source-selector">
  <div class="source-selector__carousel">
    @for (source of allSources; track source.code) {
      <button
        class="source-chip"
        [class.source-chip--selected]="isSelected(source.code)"
        matRipple
        type="button"
        [attr.aria-pressed]="isSelected(source.code)"
        [matTooltip]="source.description"
        matTooltipPosition="below"
        (click)="toggle(source.code)"
        (keydown.enter)="toggle(source.code)"
        (keydown.space)="toggle(source.code); $event.preventDefault()">
        <mat-icon class="source-chip__icon">{{ source.icon }}</mat-icon>
        <span class="source-chip__label">{{ source.label }}</span>
        @if (isSelected(source.code)) {
          <mat-icon class="source-chip__check">check</mat-icon>
        }
      </button>
    }
  </div>
</div>
