@if (loading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<div class="table-responsive">
  @if (hasData()) {
    <table mat-table [dataSource]="dataSource" matSort class="data-table">
      @for (col of columns(); track col) {
        <ng-container [matColumnDef]="col">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col }}</th>
          <td mat-cell *matCellDef="let row" (click)="onCellClick(row, col)"
              [class.data-table__cell--numeric]="isNumeric(row[col])">
            @if (isNumeric(row[col])) {
              {{ row[col] | number:'1.0-2' }}
            } @else {
              {{ row[col] }}
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="columns()"></tr>
      <tr mat-row *matRowDef="let row; columns: columns()"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[25, 50, 100]"
      [pageSize]="50"
      showFirstLastButtons>
    </mat-paginator>
  } @else if (!loading()) {
    <div class="sc-empty-state">
      <p>No hay datos para mostrar. Selecciona campos y ejecuta el reporte.</p>
    </div>
  }
</div>
