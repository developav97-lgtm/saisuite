services:

  # ── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: saisuite-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saisuite_dev
      POSTGRES_USER: saisuite
      POSTGRES_PASSWORD: saisuite_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saisuite -d saisuite_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (channels + cache) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saisuite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: saisuite-api
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./docs:/app/docs
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Sobreescribe Upstash para dev local — usa Redis del contenedor
      - UPSTASH_REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── SQS Worker (Agente Saiopen → Django) ────────────────────────
  sqs-worker:
    build: ./backend
    container_name: saisuite-sqs-worker
    restart: unless-stopped
    command: python manage.py sqs_worker
    volumes:
      - ./backend:/app
      - ./docs:/app/docs
    env_file:
      - ./backend/.env
    environment:
      - UPSTASH_REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof python || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Angular (dev server) — CORRE EN LOCAL, NO EN DOCKER ─────────
  # El frontend se ejecuta directamente en el host para evitar alto
  # consumo de CPU/RAM por polling de archivos en macOS + Docker.
  # Comando: cd frontend && ng serve   (puerto 4200)
  #
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.dev
  #   container_name: saisuite-frontend
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   ports:
  #     - "4200:4200"
  #   command: ng serve --host 0.0.0.0 --poll 2000

  # ── n8n ──────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n
    container_name: saisuite-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Base de datos — PostgreSQL (evita timeouts de SQLite)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=saisuite_dev
      - DB_POSTGRESDB_USER=saisuite
      - DB_POSTGRESDB_PASSWORD=saisuite_local
      - DB_POSTGRESDB_SCHEMA=n8n
      # URL base para webhooks
      - WEBHOOK_URL=http://localhost:5678/
      # OpenAI API Key para CFO Virtual
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Knowledge Base — Google Drive Watcher
      - N8N_GDRIVE_KB_FOLDER_ID=${N8N_GDRIVE_KB_FOLDER_ID:-placeholder-folder-id}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:-saicloud-kb-webhook-secret-dev}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      # Desactivar telemetría (evita errores EAI_AGAIN en logs)
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Permitir $env.* en expresiones de nodos
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data: